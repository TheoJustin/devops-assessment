name: CI/CD Pipeline to Nomad

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile.staging -t ${{ secrets.DOCKER_USERNAME }}/hubspot-app:staging .

      - name: Push Docker Image to Registry
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hubspot-app:staging

      - name: Verify Nomad is running
        env:
          NOMAD_ADDR: http://localhost:4646
        run: nomad status

      - name: Deploy to Nomad
        env:
          NOMAD_ADDR: http://localhost:4646
        run: |
          nomad job run -detach app.nomad.hcl
          echo "Deployment triggered successfully"

          